const ICONS = ['✦','✓','⌛','◇','●','↯','∵','◷','?','⚠','✉','→'];
const STORAGE_PAGE = 'ukTea12FunctionPageV10';
const STORAGE_DONE = 'ukTea12FunctionDoneV10';
let pageIndex = Number(localStorage.getItem(STORAGE_PAGE) || 0);
if(!Number.isFinite(pageIndex)||pageIndex<0||pageIndex>=BOXES.length) pageIndex=0;
let doneState = loadDone();
let voices=[]; let currentPlaying=null;
const app=document.getElementById('app'), vertical=document.getElementById('vertical'), sectionbar=document.getElementById('sectionbar'), toast=document.getElementById('toast');
function loadDone(){try{return JSON.parse(localStorage.getItem(STORAGE_DONE)||'{}')}catch(e){return {}}}
function saveDone(){localStorage.setItem(STORAGE_DONE, JSON.stringify(doneState));}
function escapeHtml(str){return String(str).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));}
function displayTitle(t){return String(t).replace(/^\d+｜/,'');}
function patternHtml(str){return escapeHtml(str).replace(/(\[[^\]]+\])/g,'<span class="placeholder">$1</span>');}
function escapeRegExp(str){return String(str).replace(/[.*+?^${}()|[\]\\]/g,'\\$&').replace(/\s+/g,'\\s+');}
function enHtml(card){
  const raw = String(card.en || '');
  const pattern = String(card.pattern || '');
  const parts = pattern.split(/(\[[^\]]+\])/g).filter(Boolean);
  if(!parts.some(p=>/^\[[^\]]+\]$/.test(p))) return escapeHtml(raw);
  let re = '^';
  for(const part of parts){
    re += /^\[[^\]]+\]$/.test(part) ? '(.+?)' : escapeRegExp(part);
  }
  re += '$';
  const match = raw.match(new RegExp(re));
  if(!match) {
    if(pattern.includes('[topic]') && raw.includes('advise on ')){
      return escapeHtml(raw).replace(/(advise on\s+)(.+)$/,'$1<span class="soft-part">$2</span>');
    }
    return escapeHtml(raw);
  }
  let group = 1;
  return parts.map(part => {
    if(/^\[[^\]]+\]$/.test(part)){
      return `<span class="soft-part">${escapeHtml(match[group++] || '')}</span>`;
    }
    return escapeHtml(part);
  }).join('');
}

function markFragment(raw, fragment){
  if(!fragment) return escapeHtml(raw);
  const i = raw.indexOf(fragment);
  if(i < 0) return escapeHtml(raw);
  return escapeHtml(raw.slice(0,i)) + `<span class="jp-mark">${escapeHtml(fragment)}</span>` + escapeHtml(raw.slice(i + fragment.length));
}
function trimJpFocus(x){
  return String(x || '')
    .replace(/^(、|。|\s)+/,'')
    .replace(/(です|ます|でした|ました|しています|されています|する予定です|することになっていました|必要があります|必要があるかもしれません|できません|できます|いただけますか|いただきたいです|ください|します|しました|。)+$/,'')
    .trim();
}
function jpFocus(card){
  const jp = String(card.jp || '');
  const p = String(card.pattern || '');
  let m;
  if(p.includes('[topic]')){
    if((m = jp.match(/^(.+?について)/))) return m[1].replace(/について$/,'');
    if((m = jp.match(/^(.+?の件)/))) return m[1];
  }
  if(p.includes('[previous item]')){
    if((m = jp.match(/^(.+?の件)/))) return m[1];
    if((m = jp.match(/^(.+?を受けて)/))) return m[1].replace(/を受けて$/,'');
  }
  if(p.includes('[source]')){
    if((m = jp.match(/^(.+?を見ると)/))) return m[1].replace(/を見ると$/,'');
    if((m = jp.match(/^(.+?を受けて)/))) return m[1].replace(/を受けて$/,'');
  }
  if(p.includes('[object]') || p.includes('[item]')){
    if((m = jp.match(/^(.+?)(をご|をお|を|に|について)/))) return m[1];
  }
  if(p.includes('[time]')){
    const times=['明日の朝まで','今日中','本日中','金曜午後まで','営業時間終了まで','来週前半','お時間あるとき','今週中'];
    for(const t of times) if(jp.includes(t)) return t;
  }
  if(p.includes('[A]') || p.includes('[B]')){
    if((m = jp.match(/^(.+?か.+?か)/))) return m[1];
  }
  if(p.includes('[number]')){
    if((m = jp.match(/(\d+つ|一つ|二つ|三つ|数点|いくつか)/))) return m[1];
  }
  if(p.includes('[option]')){
    if((m = jp.match(/(A案|B案|この案|この進め方|提案した日程)/))) return m[1];
  }
  if(p.includes('[do X]') || p.includes('[done X]') || p.includes('[action]')){
    if((m = jp.match(/、(.+?)(予定|必要|します|しました|すること|できる|いただける|共有|送る)/))) return trimJpFocus(m[1]);
    if((m = jp.match(/^(.+?を.+?)(予定|必要|します|しました|すること|できる|いただける)/))) return trimJpFocus(m[1]);
  }
  if(p.includes('[fact]') || p.includes('[clause]')){
    if((m = jp.match(/^(.+?か)(教えて|確認|ご確認)/))) return m[1];
    if((m = jp.match(/、(.+?)。$/))) return trimJpFocus(m[1]);
  }
  if((m = jp.match(/^(.+?について)/))) return m[1].replace(/について$/,'');
  if((m = jp.match(/^(.+?を)/))) return m[1].replace(/を$/,'');
  return '';
}
function jpHtml(card){
  return markFragment(String(card.jp || ''), jpFocus(card));
}

function enSizeClass(str){
  const n = String(str || '').length;
  if(n >= 78) return ' en-xlong';
  if(n >= 60) return ' en-long';
  if(n >= 48) return ' en-mid';
  return '';
}
function getVoice(){
  voices = speechSynthesis.getVoices ? speechSynthesis.getVoices() : [];
  const gb = voices.filter(v=>/en-GB/i.test(v.lang)||/United Kingdom|UK English|British/i.test(v.name));
  const preferred = /(Daniel|George|Oliver|Arthur|Thomas|Ryan|Noel|Harry|Serena|Kate|English \(United Kingdom\)|Google UK English)/i;
  return gb.find(v=>preferred.test(v.name)) || gb[0] || voices.find(v=>/^en/i.test(v.lang)) || null;
}
if('speechSynthesis' in window){speechSynthesis.onvoiceschanged=()=>{voices=speechSynthesis.getVoices();};voices=speechSynthesis.getVoices();}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
function showToast(text){toast.textContent=text;toast.classList.add('show');clearTimeout(showToast.t);showToast.t=setTimeout(()=>toast.classList.remove('show'),900)}
async function speak(text, card){
  if(!('speechSynthesis' in window)){alert('このブラウザでは音声読み上げが使えないようです。');return;}
  if(currentPlaying) currentPlaying.classList.remove('playing');
  speechSynthesis.cancel(); await sleep(45); if(speechSynthesis.resume) speechSynthesis.resume();
  const u=new SpeechSynthesisUtterance(text); const voice=getVoice(); if(voice) u.voice=voice;
  u.lang='en-GB'; u.rate=.84; u.pitch=1.0; u.volume=1;
  currentPlaying=card||null; if(card) card.classList.add('playing'); showToast('Playing');
  const clear=()=>{if(card) card.classList.remove('playing'); if(currentPlaying===card) currentPlaying=null;};
  u.onend=clear; u.onerror=clear;
  speechSynthesis.speak(u);
}
function stopSpeech(){if('speechSynthesis' in window)speechSynthesis.cancel(); if(currentPlaying) currentPlaying.classList.remove('playing'); currentPlaying=null; showToast('Stopped');}
function renderTabs(){
  sectionbar.innerHTML = BOXES.map((b,i)=>`<button class="sbtn ${i===pageIndex?'active':''}" data-idx="${i}" type="button">${escapeHtml(displayTitle(b.title))}</button>`).join('');
  sectionbar.querySelectorAll('.sbtn').forEach(btn=>btn.addEventListener('click',()=>scrollToPage(Number(btn.dataset.idx))));
}
function cardsHtml(b){return b.cards.map((c,i)=>{
    const key=b.id+'-'+i; const done=!!doneState[key];
    return `<article class="card ${done?'done':''}" data-key="${key}" data-en="${escapeHtml(c.en)}">
      <div class="meta"><span class="func">${escapeHtml(c.func)}</span><span class="pattern">${patternHtml(c.pattern)}</span></div>
      <div class="jp">${jpHtml(c)}</div>
      <div class="en${enSizeClass(c.en)}">${enHtml(c)}</div>
      <div class="swap">差し替え：${escapeHtml(c.swap)}</div>
    </article>`;
  }).join('');}
function renderPages(){
  vertical.innerHTML = BOXES.map((b,i)=>`<section class="section-page" data-page="${i}">
    <div class="page-head"><div class="box-line"><div class="page-title-wrap"><div class="section-icon" aria-hidden="true">${ICONS[i]||'✦'}</div><div class="box-title">${escapeHtml(b.title)}</div></div><div class="box-num">${i+1}/${BOXES.length}</div></div></div>
    <div class="tools">
      <button class="tool active" data-mode="all" type="button">All</button>
      <button class="tool" data-mode="hide-en" type="button">Hide EN</button>
      <button class="tool" data-mode="hide-jp" type="button">Hide JP</button>
      <button class="tool" data-mode="compact" type="button">Slim</button>
      <button class="tool stop" data-stop="1" type="button">Stop</button>
    </div>
    <div class="grid">${cardsHtml(b)}</div>
  </section>`).join('');
  vertical.querySelectorAll('.card').forEach(card=>{
    card.addEventListener('click',e=>{
      if(e.target.closest('.swap')){ const key=card.dataset.key; doneState[key]=!doneState[key]; saveDone(); card.classList.toggle('done', !!doneState[key]); return; }
      speak(card.dataset.en, card);
    });
    card.addEventListener('dblclick',e=>{ const key=card.dataset.key; doneState[key]=!doneState[key]; saveDone(); card.classList.toggle('done', !!doneState[key]); });
  });
  vertical.querySelectorAll('.section-page').forEach(section=>{
    section.querySelectorAll('[data-mode]').forEach(btn=>{
      const mode=btn.dataset.mode;
      btn.addEventListener('click',()=>{
        if(mode==='all'){app.classList.remove('hide-en','hide-jp','compact');}
        else {app.classList.toggle(mode)}
        vertical.querySelectorAll('[data-mode]').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
      });
    });
    const stop=section.querySelector('[data-stop]'); if(stop) stop.addEventListener('click', stopSpeech);
  });
}
function setActive(idx){
  pageIndex=idx; localStorage.setItem(STORAGE_PAGE,String(pageIndex));
  sectionbar.querySelectorAll('.sbtn').forEach((b,i)=>b.classList.toggle('active', i===idx));
  const active=sectionbar.querySelector(`.sbtn[data-idx="${idx}"]`); if(active) active.scrollIntoView({behavior:'smooth', inline:'center', block:'nearest'});
}
function scrollToPage(idx){
  const p=vertical.querySelector(`[data-page="${idx}"]`); if(p) p.scrollIntoView({behavior:'smooth', block:'start'});
  setActive(idx);
}
function next(){scrollToPage((pageIndex+1)%BOXES.length); showToast('Next')}
function prev(){scrollToPage((pageIndex-1+BOXES.length)%BOXES.length); showToast('Previous')}
function random(){let n=pageIndex; while(BOXES.length>1 && n===pageIndex)n=Math.floor(Math.random()*BOXES.length); scrollToPage(n); showToast('Random')}
renderTabs(); renderPages();
const obs = new IntersectionObserver(entries=>{
  entries.forEach(e=>{ if(e.isIntersecting) setActive(Number(e.target.dataset.page)); });
}, {root:vertical, threshold:.62});
vertical.querySelectorAll('.section-page').forEach(p=>obs.observe(p));
setTimeout(()=>scrollToPage(pageIndex), 60);
document.getElementById('nextBtn').addEventListener('click',next);document.getElementById('prevBtn').addEventListener('click',prev);document.getElementById('randomBtn').addEventListener('click',random);
let sx=0,sy=0,st=0;vertical.addEventListener('pointerdown',e=>{sx=e.clientX;sy=e.clientY;st=Date.now()});vertical.addEventListener('pointerup',e=>{const dx=e.clientX-sx, dy=e.clientY-sy, dt=Date.now()-st;if(dt>900)return;if(Math.abs(dx)>64 && Math.abs(dx)>Math.abs(dy)*1.35){random()}});
document.addEventListener('keydown',e=>{if(e.key==='ArrowDown'||e.key==='PageDown')next();if(e.key==='ArrowUp'||e.key==='PageUp')prev();if(e.key==='ArrowRight')random();if(e.key==='Escape')stopSpeech();});

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./service-worker.js').catch(()=>{});
  });
}
